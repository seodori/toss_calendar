<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회의 생성</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 0;
      background: #e8edf3;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #000;
    }
    main {
      width: min(100vw, 360px);
      height: 780px;
      padding: 48px 16px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(20, 32, 52, .22);
    }
    a {
      color: #2485ff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }
    h1 {
      margin: 32px 0 12px;
      font-size: 24px;
      line-height: 29px;
    }
    p {
      margin: 0;
      font-size: 14px;
      line-height: 22px;
      color: #555;
    }
  </style>
</head>
<body>
  <main>
    <a href="index.html">뒤로</a>
    <h1>회의 생성</h1>
    <p>생성 화면 디자인을 받으면 이 페이지에 연결됩니다.</p>
  </main>
</body>
</html>
