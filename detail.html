<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회의 상세</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 0;
      background: #e8edf3;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #000;
      letter-spacing: 0;
    }
    main {
      width: min(100vw, 360px);
      height: 780px;
      padding: 48px 16px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(20, 32, 52, .22);
    }
    a {
      color: #2485ff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }
    h1 {
      margin: 32px 0 12px;
      font-size: 24px;
      line-height: 32px;
    }
    p {
      margin: 0;
      font-size: 14px;
      line-height: 24px;
      color: #555;
    }
    dl {
      margin: 28px 0 0;
      display: grid;
      gap: 16px;
    }
    dt {
      margin: 0 0 4px;
      color: #777;
      font-size: 12px;
      font-weight: 700;
    }
    dd {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      line-height: 24px;
    }
  </style>
</head>
<body>
  <main>
    <a href="index.html">뒤로</a>
    <h1 id="title">회의 상세</h1>
    <p>임시 상세 페이지입니다. 연결된 회의 정보를 확인할 수 있습니다.</p>
    <dl>
      <div>
        <dt>일시</dt>
        <dd id="time">일정 미정</dd>
      </div>
      <div>
        <dt>장소</dt>
        <dd id="place">장소 미정</dd>
      </div>
    </dl>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.querySelector('#title').textContent = params.get('title') || '회의 상세';
    document.querySelector('#time').textContent = params.get('time') || '일정 미정';
    document.querySelector('#place').textContent = params.get('place') || '장소 미정';
  </script>
</body>
</html>
